# Operator policy profile for voxhorizon-approvals.
#
# This is the policy.yaml the DEDICATED OPERATOR agent (hermes-agent-operator)
# runs with. Deployment drops this file in as the operator container's
# `policy.yaml`; it does NOT replace Ekko's own policy.yaml (Ekko keeps the
# shipped empty overlay, so Ekko's behavior is unchanged).
#
# It maps one-for-one to the pipeline-operator skill's MCP tools
# (ekko-skills/pipeline-operator/mcp_server.py, which delegates to helper.py).
# The approval plugin gates by tool name, so these keys reference the tools'
# EXACT FULL names as Hermes presents them to the pre_tool_call hook.
#
# MCP namespacing (verified live on the VPS): Hermes presents an MCP tool to
# the pre_tool_call hook as `mcp_<server>_<tool>` with SINGLE underscores. The
# server name "pipeline-operator" is normalized to "pipeline_operator", and the
# tool functions are already named `pipeline_operator_<verb>`, so the live names
# are doubled: e.g. `mcp_pipeline_operator_pipeline_operator_render`. List those
# EXACT FULL names here — policy_overlay matches by exact equality (no fuzzy
# suffix matching), so a short name like `pipeline_operator_render` is NOT gated.
#
# Merge semantics (see policy_overlay.py / the plugin README): in-code
# defaults always win over a softening override; gating wins over allowing.

# The render tool is THE spend tool — every call renders paid Kie images.
# Gating it here makes the manager approve the spend in the dashboard
# (long-poll) before the worker runs. This is the operator's spend gate.
extra_requires_approval:
  - mcp_pipeline_operator_pipeline_operator_render

# The read tool is a pure GET of pipeline state (no spend, no side effects),
# and the brief tool is a free Supabase write the manager reviews via the
# dashboard STAGE gate (not the spend gate). Allowlisting both keeps the
# operator's read-state-then-author loop running without pestering the manager
# for non-spend actions.
allowlist:
  - mcp_pipeline_operator_pipeline_operator_read
  - mcp_pipeline_operator_pipeline_operator_brief

# Hard-block the shell/code tools. A focused marketing operator authors brief
# and concept payloads directly (in reasoning) and persists them via the MCP
# pipeline tools — it never needs a shell. Blocking these (instant reject, no
# long-poll) stops the operator from shelling out to run helper.py, which would
# otherwise hit the spend-gate long-poll and hang for the full timeout. The
# worker validates every payload server-side, so authoring-by-reasoning is safe.
blocklist:
  - execute_code
  - terminal
  - shell
