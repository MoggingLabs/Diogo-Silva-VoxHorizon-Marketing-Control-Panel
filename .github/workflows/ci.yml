name: ci

# Pre-merge gate. Runs on every PR into main, plus on push to main as a
# post-merge final guard. Deploy is owned by `deploy-stack.yml` - this file
# never deploys anything.
#
# Gate split (E0.5 / #436): the workflow is divided into a CHEAP gate and an
# EXPENSIVE gate so a failure (or a GitHub Actions billing lapse) in the heavy
# tier never blocks the cheap one.
#
#   CHEAP gate  - always runs, finishes in a minute or two, needs no services:
#     web-checks   (typecheck + lint + unit + coverage)
#     workflow-lint (actionlint over .github/workflows)
#     sql-lint      (sqlfluff over db/migrations)
#
#   EXPENSIVE gate - path-filtered (only runs when its sources change) and
#   brings up Docker services / full builds:
#     web-build           (production Next build)
#     worker              (pytest unit + coverage)
#     worker-integration  (Postgres + migrations + pytest -m integration)
#     migration-apply     (apply 0001..N to a clean Postgres, fail on error)
#     e2e                 (both verticals: image + video + both + launch-video)
#
# The `changes` job computes which source areas a PR touched; heavy jobs gate
# on its outputs. The cheap jobs do NOT depend on `changes` and never skip, so
# a billing lapse that kills the heavy tier still leaves the cheap signal green.
# See docs/ci.md for the manual-merge fallback when Actions billing is blocked.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref. Saves CI minutes when you push a
# follow-up commit before the previous build completes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # CHANGE DETECTION (E0.5 / #436)
  # Bounds the expensive gate. Each heavy job runs only when its source area
  # changed. Cheap jobs ignore this and always run. On push to main (no PR
  # diff base) every filter resolves true so the post-merge guard is complete.
  # ===========================================================================
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      worker: ${{ steps.filter.outputs.worker }}
      db: ${{ steps.filter.outputs.db }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # On push events paths-filter compares against the previous commit;
          # on PRs it compares against the base ref automatically.
          filters: |
            web:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'hooks/**'
              - 'styles/**'
              - 'middleware.ts'
              - 'next.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'tailwind.config.ts'
              - 'postcss.config.mjs'
              - 'eslint.config.mjs'
              - 'vitest.config.ts'
            worker:
              - 'worker/**'
            db:
              - 'db/migrations/**'
            e2e:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'hooks/**'
              - 'middleware.ts'
              - 'next.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'worker/**'
              - 'db/migrations/**'
              - 'tests/e2e/**'
              - 'playwright.config.ts'

  # ===========================================================================
  # CHEAP GATE
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Next.js app cheap checks: typecheck, lint, unit tests + coverage gate.
  # No production build here (that is the expensive `web-build` job) so a build
  # regression or a billing lapse in the heavy tier cannot block this signal.
  # No secrets required.
  # ---------------------------------------------------------------------------
  web-checks:
    name: Web (typecheck + lint + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests + coverage gate (>=90%)
        run: pnpm test:coverage

  # ---------------------------------------------------------------------------
  # Workflow YAML lint - catches typos / misconfigured actions before merge.
  # Cheap, runs in seconds. Always on (CI workflows can change without a code
  # change).
  # ---------------------------------------------------------------------------
  workflow-lint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.7

  # ---------------------------------------------------------------------------
  # SQL lint (E0.5 / #436): sqlfluff over the forward-only migration chain.
  # Lint-only (never rewrites files in CI). BLOCKING.
  #
  # Config lives in db/.sqlfluff (postgres dialect, raw templater, the cosmetic
  # layout rules excluded so the gate flags REAL problems on new migrations, not
  # the hand-aligned style the existing deployed files predate). The sqlfluff
  # version is pinned so an upstream release cannot turn the gate red without a
  # repo change. Two merged, deployed migrations use a valid
  # `ALTER FUNCTION ... SET search_path = a, b` that sqlfluff's postgres parser
  # cannot read; forward-only files are never edited, so they are listed in
  # db/.sqlfluffignore. A NEW migration needing that construct should add an
  # inline `-- noqa: PRS` on the line instead. See docs/ci.md.
  # migration-apply remains the authoritative correctness gate (real Postgres).
  # ---------------------------------------------------------------------------
  sql-lint:
    name: SQL lint (sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Lint db/migrations (postgres dialect)
        run: uvx --from "sqlfluff==4.2.1" sqlfluff lint db/migrations --config db/.sqlfluff

  # ===========================================================================
  # EXPENSIVE GATE (path-filtered via the `changes` job)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Production Next build - catches runtime/build-time misconfiguration. Split
  # out of the cheap checks so a build break (or billing lapse) does not block
  # typecheck/lint/unit. Runs only when web sources change. No secrets: code
  # that needs Supabase env at build time must pull lazily.
  # ---------------------------------------------------------------------------
  web-build:
    name: Web (production build)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Skip Sentry/telemetry init in CI builds.
          NEXT_TELEMETRY_DISABLED: "1"

  # ---------------------------------------------------------------------------
  # Python worker: install via uv (matches local toolchain) and run pytest.
  # Path-filtered to worker/**.
  # ---------------------------------------------------------------------------
  worker:
    name: Worker (pytest)
    needs: changes
    if: ${{ needs.changes.outputs.worker == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen --extra dev

      - name: Run tests + coverage gate (>=90% lines)
        # Coverage flags come from worker/pyproject.toml [tool.pytest.ini_options]
        # addopts (--cov=src --cov-report=term-missing --cov-fail-under=90).
        run: uv run pytest

  # ---------------------------------------------------------------------------
  # Worker INTEGRATION tier (E0.5 / #436, contract with #421).
  #
  # Brings up a real Postgres, applies the full forward-only migration chain in
  # order (same psql apply pattern as the e2e job), exports DATABASE_URL, and
  # runs `uv run pytest -m integration`. The `integration` marker is the
  # contract with the integration-test tier being built in parallel under epic
  # #421: those tests carry `@pytest.mark.integration` and talk to this
  # Postgres via DATABASE_URL.
  #
  # COORDINATION NOTE: until #421 lands marked tests, `-m integration` collects
  # zero tests. pytest exits 5 ("no tests collected") in that case, which we
  # treat as success so the wiring is in place without going red prematurely.
  # We also neutralise the repo-wide coverage addopts (`-o addopts=` + --no-cov)
  # because the >=90% gate is meaningless for the (initially empty) integration
  # selection - the unit `worker` job owns the coverage gate.
  # ---------------------------------------------------------------------------
  worker-integration:
    name: Worker (integration / Postgres)
    needs: changes
    if: ${{ needs.changes.outputs.worker == 'true' || needs.changes.outputs.db == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the steps run.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install worker deps
        working-directory: worker
        run: uv sync --frozen --extra dev

      # DB setup (the db/ci-bootstrap.sql prelude + every db/migrations/*.sql) is
      # owned by the integration conftest's `migrated_db` fixture, applied once
      # against DATABASE_URL via psycopg. We deliberately do NOT pre-apply here:
      # the migrations target Supabase (roles / publication / storage), so a raw
      # psql apply to a bare postgres:16 fails, and a double-apply would collide.
      - name: Run integration tests (pytest -m integration)
        working-directory: worker
        run: |
          set -euo pipefail
          # Neutralise the repo-wide coverage addopts and run only the
          # `integration`-marked tier against the Postgres service above.
          # Exit code 5 = "no tests collected" (the #421 tier is not merged
          # yet); treat it as success so the contract is wired without a
          # premature red. Any real failure (1) still fails the job.
          set +e
          uv run pytest -m integration -o addopts="" --no-cov -p no:cacheprovider
          code=$?
          set -e
          if [ "$code" = "0" ] || [ "$code" = "5" ]; then
            if [ "$code" = "5" ]; then
              echo "No integration-marked tests collected yet (epic #421 pending) - passing."
            fi
            exit 0
          fi
          exit "$code"

  # ---------------------------------------------------------------------------
  # Migration-apply correctness (E0.5 / #436): apply the full chain 0001..N to
  # a pristine Postgres and fail on the first error. This is a focused check
  # that the forward-only chain is self-consistent on an empty database,
  # independent of the integration tests. Path-filtered to db/migrations/**.
  # ---------------------------------------------------------------------------
  migration-apply:
    name: Migration apply (clean Postgres)
    needs: changes
    if: ${{ needs.changes.outputs.db == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap Supabase scaffolding the migrations reference
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          # The chain targets Supabase (anon / authenticated / service_role roles,
          # the supabase_realtime publication, the storage schema). A bare
          # postgres:16 lacks those, so provision them first from the single shared
          # source (mirrors the integration harness). Idempotent; no app schema.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f db/ci-bootstrap.sql

      - name: Apply migrations 0001..N (fail on first error)
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          count=0
          for f in db/migrations/[0-9][0-9][0-9][0-9]_*.sql; do
            echo "==> applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"
            count=$((count + 1))
          done
          echo "applied $count migration(s) cleanly"

  # ---------------------------------------------------------------------------
  # End-to-end: drive the full pipeline across BOTH verticals (E0.2 / #426).
  #
  # Brings up the LOCAL Supabase stack (Docker is available on GitHub runners),
  # applies the full forward-only migration chain (db/migrations/0001..N - the
  # repo has no supabase/migrations dir, so we apply them explicitly via psql),
  # starts the Python worker with ALL FAKE_* flags on (zero external calls,
  # deterministic), starts the Next app, and runs the e2e specs (chromium).
  #
  # The matrix runs each spec as its own job so a failure isolates to one
  # vertical and they parallelise:
  #   - pipeline-workflow.spec.ts  (image, 12-stage no-stall - T.5/#318)
  #   - pipeline-video.spec.ts     (video track            - PF-G-3/#204)
  #   - pipeline-both.spec.ts      (both tracks            - PF-G-3/#204)
  #   - launch-video.spec.ts       (video launch package   - V3-8/#114)
  #
  # Local-only secrets: the printed service_role key + a dummy worker bearer.
  # NEVER a cloud project / real key. Path-filtered to web + worker + db + e2e.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (${{ matrix.spec }})
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' }}
    runs-on: ubuntu-latest
    # All four e2e specs are required gates. pipeline-video / pipeline-both now
    # drive the real 12-stage gated DAG for video (creative_qa + spec probe a
    # real MP4 fixture, compliance/copy/finalize/launch/monitor via the real
    # worker verdicts), so they are blocking. The DB-level FK / rollup net in the
    # integration job is a hard gate regardless. `continue-on-error` reads the
    # matrix flag (all false) so the wiring stays if a spec ever needs to be
    # temporarily quarantined.
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - spec: pipeline-workflow.spec.ts
            allow_failure: false
          - spec: pipeline-video.spec.ts
            allow_failure: false
          - spec: pipeline-both.spec.ts
            allow_failure: false
          - spec: launch-video.spec.ts
            allow_failure: false
          - spec: clients-crud.spec.ts
            allow_failure: false
    env:
      # Local Supabase stack endpoints (supabase start defaults).
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      LOCAL_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      # Dummy local worker bearer - NEVER a real key. The Python worker reads it
      # (verify_secret) and the e2e driver presents it; deliberately NOT exported
      # to the Next app (see note on the build/start steps).
      WORKER_SHARED_SECRET: e2e-local-worker-secret
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      # ffmpeg/ffprobe: generate the MP4 fixture (below) AND let the worker
      # ffprobe it at the QA + spec gates. The worker image ships ffmpeg in
      # prod; here the worker runs from source on the runner, so install it.
      # Cheap (~seconds) and harmless for the image-only spec, so we run it for
      # every e2e matrix job rather than gating on the spec name.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # The video QA + spec gates need a REAL probeable MP4 in Supabase Storage.
      # There is no fixture in the repo + no local ffmpeg at author time, so we
      # synthesise a 9:16 H.264 + AAC ~4s clip here. The e2e harness
      # (workflow-driver.readVideoFixtureBytes) reads this exact path and uploads
      # the bytes to the `creatives` bucket; the worker downloads + ffprobes them.
      - name: Generate video fixture (ffmpeg)
        run: |
          set -euo pipefail
          mkdir -p tests/e2e/_assets
          ffmpeg -y \
            -f lavfi -i testsrc=size=144x256:rate=15:duration=4 \
            -f lavfi -i sine=frequency=440:duration=4 \
            -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest \
            tests/e2e/_assets/video-fixture.mp4
          ffprobe -v error -show_entries stream=codec_name,width,height -of default=noprint_wrappers=1 \
            tests/e2e/_assets/video-fixture.mp4

      - name: Install uv (worker toolchain)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install worker deps
        working-directory: worker
        run: uv sync --frozen --extra dev

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`): resolving "latest" hits the GitHub releases
          # API, which intermittently rate-limits ("Failed to resolve latest
          # Supabase CLI release") and flakes the now-blocking e2e matrix. A
          # pinned version downloads the release asset directly (no API lookup).
          # Bump deliberately. v2.101.0 is what `latest` resolved to here.
          version: 2.101.0

      - name: Start Supabase (local stack)
        run: supabase start

      - name: Resolve local service_role key
        id: sb
        run: |
          set -euo pipefail
          # `jq` is preinstalled on ubuntu runners. CLI versions vary the casing
          # of the key, so try each candidate and take the first non-empty one.
          JSON="$(supabase status --output json)"
          KEY="$(echo "$JSON" | jq -r '.SERVICE_ROLE_KEY // .service_role_key // .serviceRoleKey // empty')"
          if [ -z "$KEY" ]; then
            echo "service_role key not found in supabase status JSON"; echo "$JSON"; exit 1
          fi
          echo "::add-mask::$KEY"
          echo "service_role_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Apply migrations (db/migrations 0001..N)
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in db/migrations/[0-9][0-9][0-9][0-9]_*.sql; do
            echo "==> applying $f"
            psql "$LOCAL_DB_URL" -v ON_ERROR_STOP=1 -q -f "$f"
          done
          # Reload PostgREST's schema cache so the freshly-migrated tables are
          # exposed at the REST API the Next + worker clients use.
          psql "$LOCAL_DB_URL" -v ON_ERROR_STOP=1 -c "notify pgrst, 'reload schema';"

      - name: Start worker (uvicorn, FAKE integrations)
        env:
          SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ steps.sb.outputs.service_role_key }}
          WORKER_SHARED_SECRET: ${{ env.WORKER_SHARED_SECRET }}
          # All FAKE_* on -> zero external calls (Meta/GHL/Drive/render). The
          # compliance + QA verdicts are NEVER faked (real worker engines).
          FAKE_RENDER: "true"
          FAKE_META: "true"
          FAKE_GHL: "true"
          FAKE_DRIVE: "true"
        working-directory: worker
        run: |
          set -euo pipefail
          uv run uvicorn src.main:app --host 127.0.0.1 --port 8000 > "$GITHUB_WORKSPACE/worker.log" 2>&1 &
          echo "WORKER_PID=$!" >> "$GITHUB_ENV"
          # Wait for /work/health (bearer-authed) to return 200.
          for i in $(seq 1 60); do
            code="$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${WORKER_SHARED_SECRET}" \
              http://127.0.0.1:8000/work/health || true)"
            if [ "$code" = "200" ]; then echo "worker up"; break; fi
            if [ "$i" = "60" ]; then echo "worker did not start"; cat "$GITHUB_WORKSPACE/worker.log"; exit 1; fi
            sleep 1
          done

      # NOTE: WORKER_URL is deliberately NOT exported to the Next app. The
      # advance / review-decision routes fire-and-forget at the worker's
      # ideation/generation producers when WORKER_URL is set; in this e2e the
      # test drives generation deterministically (seeded finals + closure
      # events), so we keep the Next->worker push OFF (the routes no-op without
      # WORKER_URL) to avoid the real producer racing the seeded state. The e2e
      # test calls the worker tool endpoints directly instead.
      - name: Build Next app
        env:
          SUPABASE_SECRET_KEY: ${{ steps.sb.outputs.service_role_key }}
        run: pnpm build

      - name: Start Next app
        env:
          SUPABASE_SECRET_KEY: ${{ steps.sb.outputs.service_role_key }}
        run: |
          set -euo pipefail
          pnpm start > "$GITHUB_WORKSPACE/next.log" 2>&1 &
          echo "NEXT_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/pipeline || true)"
            # Any HTTP response (200/3xx/4xx) means the server is listening.
            if [ -n "$code" ] && [ "$code" != "000" ]; then echo "next up ($code)"; break; fi
            if [ "$i" = "60" ]; then echo "next did not start"; cat "$GITHUB_WORKSPACE/next.log"; exit 1; fi
            sleep 1
          done

      - name: Install Playwright chromium
        run: pnpm test:e2e:install

      - name: Run e2e spec (${{ matrix.spec }}, chromium)
        env:
          # The e2e harness reads Supabase + worker config from the env. Setting
          # PLAYWRIGHT_BASE_URL makes playwright.config.ts skip the auto-spawned
          # webServer and target the pre-started Next server above.
          SUPABASE_SECRET_KEY: ${{ steps.sb.outputs.service_role_key }}
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          WORKER_URL: http://127.0.0.1:8000
          CI: "true"
        run: pnpm exec playwright test "${{ matrix.spec }}" --project=chromium

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "===== worker.log ====="; cat "$GITHUB_WORKSPACE/worker.log" || true
          echo "===== next.log ====="; cat "$GITHUB_WORKSPACE/next.log" || true

      - name: Stop background servers
        if: always()
        run: |
          [ -n "${WORKER_PID:-}" ] && kill "${WORKER_PID}" 2>/dev/null || true
          [ -n "${NEXT_PID:-}" ] && kill "${NEXT_PID}" 2>/dev/null || true
          supabase stop || true
