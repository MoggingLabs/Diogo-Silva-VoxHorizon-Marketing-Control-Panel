name: deploy-stack

# Build the web + worker images on every push to main that touches the
# stack source, push to GHCR, then SSH-deploy to the VPS. Manual
# `workflow_dispatch` is the bootstrap / hotfix path.
#
# Triggered on push to main when:
#   - worker/** changes (source, Dockerfile, deps)
#   - web/** or any Next.js app source changes
#   - Caddyfile changes (routing affects the running services)
#   - docker-compose.yml changes (service topology)
#   - this workflow itself changes (so a workflow fix can self-deploy)

on:
  # === DEPLOY AUTO-TRIGGER (E0.5 / #436) ===============================
  # Auto-deploy on push to main was DISABLED for the duration of the pipeline
  # rebuild (CI-gated merges must not touch the live VPS). The rebuild shipped
  # and the go-live completed (2026-05-25), so the documented end state is
  # restored: a push to main that touches the stack source rebuilds + ships.
  # The pre-deploy migration gate (below) + the per-service healthchecks are the
  # deploy-time safety; CI runs in parallel on the same commit.
  # `workflow_dispatch` stays as the manual bootstrap / hotfix path.
  # (Documented in docs/ci.md under "Deploy auto-trigger".)
  push:
    branches: [main]
    paths:
      - worker/**
      - web/**
      - app/**
      - components/**
      - lib/**
      - hooks/**
      - middleware.ts
      - next.config.ts
      - package.json
      - pnpm-lock.yaml
      - Caddyfile
      - docker-compose.yml
      - .github/workflows/deploy-stack.yml
  workflow_dispatch:

# One rollout at a time. Do NOT cancel a deploy mid-flight — that can
# leave the VPS in a half-pulled state. New commits queue.
concurrency:
  group: deploy-stack
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------
  # Build the worker image and push to GHCR. We tag both `latest` and
  # the commit SHA so rollback is a one-liner against the previous SHA.
  # --------------------------------------------------------------------
  build-and-push-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image tag + lowercase GHCR owner
        run: |
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          # github.repository_owner can be mixed-case (e.g. "MoggingLabs"), but
          # GHCR repository names must be lowercase. Lowercase it so the tag is
          # valid and the namespace follows the repo across transfers/renames.
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          # Publish to ghcr.io/<lowercased-repo-owner>/* (see the meta step). The
          # workflow GITHUB_TOKEN has packages:write for its own org, so the
          # namespace must track the repo owner; docker-compose.yml pulls the same
          # namespace via ${GHCR_OWNER:-mogginglabs}, so keep that default in sync
          # with this repo's owner.
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/voxhorizon-worker:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/voxhorizon-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  # --------------------------------------------------------------------
  # Build the web (Next.js) image and push to GHCR. NEXT_PUBLIC_* values
  # are baked at build time, so they're passed as build-args from repo
  # Secrets (NOT Variables — they live alongside VPS_SSH_KEY etc.).
  # --------------------------------------------------------------------
  build-and-push-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image tag + lowercase GHCR owner
        run: |
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          # github.repository_owner can be mixed-case (e.g. "MoggingLabs"), but
          # GHCR repository names must be lowercase. Lowercase it so the tag is
          # valid and the namespace follows the repo across transfers/renames.
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          # Publish to ghcr.io/<lowercased-repo-owner>/* (see the meta step + the
          # worker job above); docker-compose.yml pulls the same namespace.
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/voxhorizon-web:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/voxhorizon-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # --------------------------------------------------------------------
  # Build the operator-daemon (silent-failure PR-3) image and push to
  # GHCR. The daemon is a sidecar that claims `operator_dispatch`
  # work_items, docker-execs into hermes-agent-operator, and PATCHes the
  # row closed. Mirrors the worker job's structure.
  # --------------------------------------------------------------------
  build-and-push-operator-daemon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image tag + lowercase GHCR owner
        run: |
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: operator-daemon
          file: operator-daemon/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/voxhorizon-operator-daemon:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/voxhorizon-operator-daemon:${{ github.sha }}
          cache-from: type=gha,scope=operator-daemon
          cache-to: type=gha,mode=max,scope=operator-daemon

  # --------------------------------------------------------------------
  # SSH into the VPS, pull the new images, roll the compose stack, and
  # wait for BOTH service healthchecks to come back green before
  # pruning. Pinned via VPS_SSH_KEY (deploy-only ed25519 — NOT Pedro's
  # admin key).
  # --------------------------------------------------------------------
  deploy:
    needs: [build-and-push-worker, build-and-push-web, build-and-push-operator-daemon]
    runs-on: ubuntu-latest
    # The SSH script does `docker login ghcr.io` with GITHUB_TOKEN to pull the
    # org packages built above. Org packages are private by default, so the
    # deploy job's token needs packages:read (in addition to the default
    # contents:read) to pull them on the VPS.
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            # Bootstrap layout: /opt/voxhorizon holds runtime state (.env,
            # compose symlink, caddy volumes) and /opt/voxhorizon/repo holds
            # the source. Git ops have to run inside the repo; compose runs
            # from the parent so env_file=/opt/voxhorizon/.env resolves.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            git -C /opt/voxhorizon/repo fetch --quiet origin main
            git -C /opt/voxhorizon/repo reset --hard origin/main
            cd /opt/voxhorizon
            # === pre-deploy migration gate (E5.5 / #523) ===========================
            # deploy-stack.yml applies NO migrations: schema is pushed manually via
            # `supabase db push`, decoupled from this code deploy. So a rolled image
            # can boot against a DB that is BEHIND the schema the code requires (a
            # forgotten / failed db push), which then surfaces as a cryptic
            # `relation/column does not exist` deep in a request AFTER the worker
            # reported healthy and took traffic.
            #
            # We choose a pre-deploy CHECK (not an in-deploy migrate): applying DDL
            # from the deploy path to a live multi-tenant DB is the riskier option,
            # and the expand/contract rule (docs/migrations.md) requires DDL be
            # additive-first and reviewed -- never auto-applied as a deploy side
            # effect. So the gate is read-only: it FAILS the deploy if the DB is
            # behind the code's required schema floor, leaving the running stack
            # untouched. Fix forward by running the owed `supabase db push`, then
            # re-run this deploy.
            #
            # The check probes the SAME sentinel object the in-app guard uses
            # (worker/src/services/schema_guard.py: SENTINEL_TABLE). The migration
            # chain is forward-only files with no schema_migrations table, so the
            # presence of the table the latest required migration creates is the
            # proof the schema is at/above that floor. Bump REQUIRED_SENTINEL_TABLE
            # below in lockstep with schema_guard.SENTINEL_TABLE when a new
            # migration becomes a hard code dependency.
            #
            # The probe uses the SAME credentials the stack uses (Supabase REST:
            # SUPABASE_URL + SUPABASE_SECRET_KEY from /opt/voxhorizon/.env) rather
            # than a direct Postgres DSN: the worker talks to the DB over REST and
            # no psql DSN is provisioned on the VPS. With the service-role key
            # (RLS-bypassing) a GET on the sentinel table returns 200 when it exists
            # and 404 (PostgREST PGRST205) when the schema is behind. If the creds
            # are missing or the table is absent we FAIL CLOSED: a deploy that cannot
            # verify the schema must not silently ship.
            set -a; . /opt/voxhorizon/.env; set +a
            # Sentinel = the `creative` base from 0034 (the foundation keystone the
            # whole gate/rollup/FK system depends on). Keep in lockstep with
            # worker/src/services/schema_guard.py SENTINEL_TABLE.
            REQUIRED_MIGRATION="0034_creative_identity_base"
            REQUIRED_SENTINEL_TABLE="creative"
            if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SECRET_KEY:-}" ]; then
              echo "migration gate: SUPABASE_URL / SUPABASE_SECRET_KEY not set in"
              echo "/opt/voxhorizon/.env; cannot verify schema floor. Failing closed."
              exit 1
            fi
            echo "migration gate: requiring $REQUIRED_MIGRATION (sentinel table $REQUIRED_SENTINEL_TABLE) via Supabase REST"
            gate_code=$(curl -s -o /dev/null -w '%{http_code}' \
              "$SUPABASE_URL/rest/v1/$REQUIRED_SENTINEL_TABLE?select=*&limit=0" \
              -H "apikey: $SUPABASE_SECRET_KEY" \
              -H "Authorization: Bearer $SUPABASE_SECRET_KEY" || true)
            if [ "$gate_code" != "200" ]; then
              echo "DEPLOY BLOCKED: DB schema is behind code (HTTP $gate_code for"
              echo "$REQUIRED_SENTINEL_TABLE). Required migration $REQUIRED_MIGRATION"
              echo "is not applied. Apply the owed migrations, then re-run this deploy."
              echo "The running stack was NOT touched."
              exit 1
            fi
            echo "migration gate: schema is at/above the required floor; proceeding."
            # === end pre-deploy migration gate =====================================
            docker compose pull
            docker compose up -d --remove-orphans
            # Wait for each service to report healthy before pruning the
            # old images. Up to ~120s per service -- matches the slowest
            # healthcheck cadence (operator-daemon start_period 60s + a couple
            # of 30s interval ticks; web/worker are faster but share the cap).
            # operator-daemon is included so a dead sidecar (failed auth/skill
            # probe leaves it unhealthy) fails the deploy loudly instead of
            # rolling out a silently-broken operator.
            for svc in web worker operator-daemon; do
              status=unhealthy
              for i in $(seq 1 24); do
                cid=$(docker compose ps -q "$svc")
                status=$(docker inspect --format='{{.State.Health.Status}}' "$cid" 2>/dev/null || echo unhealthy)
                [ "$status" = "healthy" ] && break
                sleep 5
              done
              if [ "$status" != "healthy" ]; then
                echo "$svc unhealthy after rollout (status=$status)"
                docker compose logs --tail=200 "$svc"
                exit 1
              fi
            done
            docker image prune -f
