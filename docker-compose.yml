# VoxHorizon — VPS container stack.
#
# Topology: Caddy → web → worker. Only Caddy has public ports (:80/:443);
# web (Next.js, :3000) and worker (FastAPI, :8000) live on the internal
# Docker network and are reached by Caddy via service DNS. Worker stays
# `expose:`-only — no host port binding — so the host firewall cannot
# accidentally surface it.
#
# Caddy fronts the dashboard over HTTPS (Let's Encrypt) and terminates TLS.
# The web service proxies API calls to worker over the internal network;
# Caddy itself only speaks to web.

services:
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: ghcr.io/pveloso01/voxhorizon-worker:${WORKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    # Production path: env file lives at the canonical absolute path on
    # the VPS (chmod 600, owned by the deploy user). Dev override:
    #   env_file: ./worker/.env
    # — substitute the line below when running locally on a workstation.
    env_file:
      - /opt/voxhorizon/.env
    expose:
      - "8000"
    volumes:
      # B-roll pool — Diogo curates this over time; persistent named
      # volume keeps it across image rebuilds.
      - worker-broll-pool:/app/storage/broll-pool
      # Worker logs / runtime state. The image logs to stdout (JSON via
      # structlog), but anything written under /app/storage (sidecars,
      # tmp transcode buffers) lives here.
      - worker-logs:/app/storage/logs
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS -H "Authorization: Bearer ${WORKER_SHARED_SECRET}" http://localhost:8000/work/health || exit 1'
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # web: VPS-8 (#229)
  #   Next.js dashboard. Builds NEXT_PUBLIC_* env into the static bundle at
  #   image-build time (they're inlined into client JS, so they must be
  #   present as build args, not just runtime env). Runtime secrets come
  #   from the shared /opt/voxhorizon/.env. No public port — Caddy reaches
  #   it on the internal Docker network as `web:3000`.
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    image: ghcr.io/pveloso01/voxhorizon-web:${WEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - /opt/voxhorizon/.env
    expose:
      - "3000"
    depends_on:
      worker:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS http://localhost:3000/ || exit 1'
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # caddy: VPS-3 (#160), updated for VPS-8 (#229)
  #   Fronts the dashboard (web) over HTTPS (Let's Encrypt), terminates
  #   TLS, and exposes :80 + :443 publicly. Caddy now talks to `web`, not
  #   `worker` — the worker is reached only through the web app's server
  #   routes on the internal network.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      # Set by the VPS's /opt/voxhorizon/.env at deploy time. The web
      # process does not read this — Caddy substitutes it into the
      # Caddyfile site address at startup.
      VOXHORIZON_DASHBOARD_HOST: ${VOXHORIZON_DASHBOARD_HOST:-dashboard.voxhorizon.example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data # ACME certs
      - caddy-config:/config # Caddy state
      - caddy-logs:/var/log/caddy

volumes:
  worker-broll-pool:
    name: voxhorizon-worker-broll-pool
  worker-logs:
    name: voxhorizon-worker-logs
  caddy-data:
    name: voxhorizon-caddy-data
  caddy-config:
    name: voxhorizon-caddy-config
  caddy-logs:
    name: voxhorizon-caddy-logs
